name = "mpprouter"
main = "src/index.ts"
compatibility_date = "2026-04-09"
compatibility_flags = ["nodejs_compat"]
account_id = "2d3f34ca0a1426b30a7d07cf79bdac90"

# Force @stellar/stellar-sdk and @stellar/stellar-base to their CJS
# entry points, NOT the minified browser bundles.
#
# Without these aliases, esbuild's `browser: true` resolution (default
# for Workers) picks `dist/stellar-sdk.min.js` and `dist/
# stellar-base.min.js` — both of which inline their OWN copy of the
# Transaction/TransactionBuilder classes. Meanwhile any direct
# `require('@stellar/stellar-base')` from a sub-file (e.g.
# `stellar-sdk/lib/rpc/transaction.js`) ends up resolving to the
# CJS `lib/index.js` of stellar-base. Result: TWO copies of the
# `Transaction` class in the bundle, `instanceof` fails across
# them, and `assembleTransaction → TransactionBuilder.cloneFrom`
# throws `TypeError: expected a 'Transaction', got: [object Object]`.
#
# Aliasing both packages to their CJS entry forces every import to
# share one module instance.
[alias]
"@stellar/stellar-sdk" = "./node_modules/@stellar/stellar-sdk/lib/index.js"
"@stellar/stellar-base" = "./node_modules/@stellar/stellar-base/lib/index.js"

[[kv_namespaces]]
binding = "MPP_STORE"
id = "b0fa51efc09e4e708c6bd5061b0663e0"

# Public keys (not secrets, safe to commit)
[vars]
STELLAR_NETWORK = "stellar:pubnet"
STELLAR_RPC_URL = "https://soroban-rpc.mainnet.stellar.gateway.fm"
TEMPO_RPC_URL = "https://rpc.tempo.xyz"
# UNUSED as of 2026-04-10. No code path reads this. See src/index.ts and
# notes.md for context. Intended to skip Soroban simulation for sub-$0.05
# charges; never implemented.
OPTIMISTIC_THRESHOLD = "0.05"
RATE_LIMIT_MAX = "10"

# 2026-04-11 fixed XLM/USD rate, operator-updated. Sets the conversion
# ratio for XLM-denominated Stellar channels so the router stays solvent
# in its cross-asset broker role: agent pays N/XLM_USD_RATE XLM on the
# Stellar side, router pays N USDC on the Tempo side, broker net ≈ 0.
# Update this whenever XLM price moves materially (>5% in either
# direction) and `wrangler deploy` to roll forward. Only XLM channels
# are affected — USDC SAC channels (like agent2) ignore this value.
# See internaldocs/v2-todo.md#c and v2-session-session-done.md §5.1.
XLM_USD_RATE = "0.1533"

# ---------- x402 inbound over Stellar (Phase 1) ----------
# Non-secret defaults for the stellar.x402 branch of the proxy.
# The router runs an in-process x402 facilitator backed by
# @x402/stellar/exact/facilitator, receives agent USDC on Stellar
# mainnet at STELLAR_X402_PAY_TO, and pays the downstream merchant
# from the existing Tempo pool. See src/mpp/stellar-x402-server.ts
# and tasks/todo.md for design.
#
# Flip X402_ENABLED to "false" to disable the new branch entirely
# (classifyAuth falls through to passthrough for non-mppx credentials).
# No other changes required.
X402_ENABLED = "true"
# G... recipient address. Agent USDC lands here after settle.
# Public key only — must NOT be a secret. Operators can rotate
# this by flipping the value and restarting.
#
# Intentionally set to the SAME address as STELLAR_ROUTER_PUBLIC
# (the mppx pool). Both the MPP `WWW-Authenticate` dialect and the
# x402 `Payment-Required` dialect advertise this one address as
# payTo, so a single Stellar account receives USDC from both
# protocols. This keeps operator accounting simple — one pool,
# one reconciliation. If you ever split these (e.g. isolate x402
# funds into a separate account for independent risk control),
# update this comment AND the two call sites:
#   - src/mpp/stellar-server.ts:75  (getRouterStellarAddress)
#   - src/mpp/stellar-x402-server.ts:436  (buildX402PaymentRequiredHeader)
STELLAR_X402_PAY_TO = "GDK3AVW3YE6UL3J4WLNKBMP65KSY32YPUKIOC6PXW65XJ3LEG3YIDXXB"

# Secrets (set via: wrangler secret put <NAME>)
#
# STELLAR_ROUTER_PUBLIC          — G... Router pool address (receives agent USDC via mppx)
# STELLAR_GAS_SECRET             — S... Gas sponsor keypair (pays tx fees, low-value)
# STELLAR_GAS_PUBLIC             — G... Gas sponsor address
# STELLAR_X402_FACILITATOR_SECRET — S... Stellar x402 facilitator signer.
#                                  Builds + submits Soroban invoke txs for
#                                  the stellar.x402 branch's settle step.
#                                  Can reuse STELLAR_GAS_SECRET — same
#                                  account, different env var so operators
#                                  can rotate them independently if wanted.
# TEMPO_ROUTER_PRIVATE_KEY       — 0x... EVM key (pays merchants on Tempo)
# TEMPO_ROUTER_ADDRESS           — 0x... EVM address
# MPP_SECRET_KEY                 — random hex string used by mppx to HMAC-bind 402
#                                  challenges so returning credentials can be
#                                  verified statelessly. Rotate to invalidate all
#                                  outstanding challenges.
#
# Note: STELLAR_ROUTER_SECRET is NOT stored anywhere in the app.
# The Router pool private key is managed offline by the operator.
